services:
  nginx-reverse-proxy:
    build: ./nginx
    image: js55998/nginx-reverse-proxy
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-network
    depends_on:
      - backend-node-1
      - backend-node-2
      - backend-python
      - backend-java

  backend-node-1:
    build: ./backend1-node
    image: js55998/node-backend
    container_name: node-backend-1
    environment:
      - PORT=3000
    networks:
      - backend-network

  backend-node-2:
    build: ./backend1-node
    image: js55998/node-backend
    container_name: node-backend-2
    environment:
      - PORT=3001
    networks:
      - backend-network

  backend-python:
    build: ./backend2-python
    image: js55998/python-backend
    container_name: python-backend
    networks:
      - backend-network

  backend-java:
    build: ./backend3-java
    image: js55998/java-backend
    container_name: java-backend
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
