services:
  nginx-reverse-proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-network
    depends_on:
      - backend-node
      - backend-node2
      - backend-python
      - backend-java

  backend-node:
    build: ./backend1-node
    container_name: node-backend
    environment:
      - PORT=3000
    networks:
      - backend-network

  backend-node2:
    build: ./backend1-node
    container_name: node-backend2
    environment:
      - PORT=3001
    networks:
      - backend-network

  backend-python:
    build: ./backend2-python
    container_name: python-backend
    networks:
      - backend-network

  backend-java:
    build: ./backend3-java
    container_name: java-backend
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
