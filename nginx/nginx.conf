events {
    worker_connections 1024;
}

http {
    upstream node_backend {
        least_conn;
        server backend-node:3000 weight=3 max_fails=3 fail_timeout=30s;
        server backend-node2:3001 weight=2 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream python_backend {
        server backend-python:5000 max_fails=3 fail_timeout=30s;
    }

    upstream java_backend {
        ip_hash;
        server backend-java:8080;
    }

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        access_log /var/log/nginx/reverse-proxy-access.log;
        error_log /var/log/nginx/reverse-proxy-error.log;

        location / {
            return 200 "Welcome to API Gateway\n";
            add_header Content-Type text/plain;
        }

        location /api/node/ {
            proxy_pass http://node_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/python/ {
            proxy_pass http://python_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=mylimit burst=20 nodelay;
        }

        location /api/java/ {
            proxy_pass http://java_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
}